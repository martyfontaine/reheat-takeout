<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reheat — Gene shows you the ropes</title>
<style>
  :root {
    --orange: #F4A85C;
    --red: #CB1C22;
    --rim: #D42E28;
    --paper-0: #FFFDF8;
    --paper-1: #F1E5D2;
    --box-line: #B89A7E;
    --ink: #3A2A20;
    --ink-soft: #7A6250;
    --card: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
    background: linear-gradient(150deg, var(--orange) 0%, var(--red) 100%);
    background-attachment: fixed;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 22px 20px 20px;
    -webkit-font-smoothing: antialiased;
  }

  .wordmark {
    color: #FFF3E4;
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 700;
    opacity: 0.85;
    margin-bottom: 12px;
  }

  /* ---- Gene, the takeout box ---- */
  .stage { height: 168px; display: flex; align-items: flex-end; justify-content: center; }
  #gene { width: 150px; height: 158px; animation: bob 3.4s ease-in-out infinite; transform-origin: 50% 100%; }
  @keyframes bob { 0%,100% { transform: translateY(0) rotate(-1.2deg); } 50% { transform: translateY(-9px) rotate(1.2deg); } }
  .steam { animation: rise 2.8s ease-in-out infinite; transform-origin: center; }
  .steam.b { animation-delay: 0.5s; }
  .steam.c { animation-delay: 1s; }
  @keyframes rise { 0% { opacity: 0; transform: translateY(6px); } 40% { opacity: 0.7; } 100% { opacity: 0; transform: translateY(-10px); } }
  @media (prefers-reduced-motion: reduce) { #gene, .steam { animation: none; } }

  /* ---- card ---- */
  .card {
    background: var(--card);
    border-radius: 22px;
    width: 100%;
    max-width: 420px;
    padding: 26px 24px 22px;
    box-shadow: 0 18px 40px rgba(90, 20, 10, 0.28);
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .step-tag {
    color: var(--rim);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 25px;
    line-height: 1.18;
    letter-spacing: -0.01em;
    margin-bottom: 14px;
  }

  p { font-size: 16.5px; line-height: 1.5; color: var(--ink-soft); margin-bottom: 12px; }
  p strong { color: var(--ink); font-weight: 650; }

  .aside {
    background: #FBF3E6;
    border-left: 4px solid var(--orange);
    border-radius: 0 12px 12px 0;
    padding: 12px 14px;
    font-size: 14.5px;
    line-height: 1.45;
    color: var(--ink);
    margin-top: 4px;
  }
  .aside b { color: var(--rim); }

  .spacer { flex: 1; min-height: 10px; }

  /* ---- controls ---- */
  .dots { display: flex; gap: 7px; justify-content: center; margin: 18px 0 16px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #E5D6C2; transition: all 0.25s; }
  .dot.on { background: var(--rim); transform: scale(1.25); }

  .row { display: flex; gap: 10px; align-items: center; }

  button {
    font-family: inherit;
    font-size: 16px;
    font-weight: 650;
    border: none;
    border-radius: 13px;
    padding: 13px 18px;
    cursor: pointer;
    transition: transform 0.08s ease, filter 0.15s ease;
  }
  button:active { transform: translateY(1px) scale(0.985); }
  .next { flex: 1; background: linear-gradient(135deg, var(--orange), var(--red)); color: #fff; }
  .next:hover { filter: brightness(1.05); }
  .back { background: transparent; color: var(--ink-soft); padding: 13px 8px; }
  .back:disabled { opacity: 0; pointer-events: none; }

  .fade { animation: fade 0.32s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ---- Google Takeout screenshot (walkthrough steps) ---- */
  .shot { margin-top: 16px; }
  .frame {
    border: 1px solid #EADFCF;
    border-radius: 14px;
    overflow: hidden;
    background: #FBF5EB;
    box-shadow: 0 10px 26px -16px rgba(60, 40, 25, 0.28);
  }
  .frame .bar {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 11px;
    background: #F3E9D8;
    border-bottom: 1px solid #EADFCF;
  }
  .frame .bar i { width: 9px; height: 9px; border-radius: 50%; background: #D8C7AF; }
  .frame .url { margin-left: 8px; font-size: 12px; font-weight: 650; color: var(--ink-soft); letter-spacing: 0.01em; }
  .frame img { display: block; width: auto; max-width: 100%; max-height: 216px; margin: 0 auto; }

  /* ---- autofit: zoom the whole walkthrough to fill the app window ---- */
  body { padding: 0; justify-content: center; }
  #app { width: 470px; display: flex; flex-direction: column; align-items: center; padding: 22px 20px; }

  /* ---- recycle (uninstall) ---- */
  .recycle { margin-top: 16px; background: #EEF6EE; border: 1px solid #CDE4CD; border-radius: 14px; padding: 14px 15px; font-size: 14.5px; line-height: 1.5; color: var(--ink); }
  .recycle .lead { font-weight: 700; color: #2E7D46; margin-bottom: 6px; }
  .recycle .wink { color: var(--ink-soft); }
  .recycle-btn { margin-top: 12px; width: 100%; background: #fff; color: #2E7D46; border: 1.5px solid #9CCBA4; border-radius: 12px; font: inherit; font-size: 15px; font-weight: 700; padding: 12px 14px; cursor: pointer; transition: background .12s, transform .08s; }
  .recycle-btn:hover { background: #F3FAF3; }
  .recycle-btn:active { transform: translateY(1px); }
  .recycle .confirm { display: flex; gap: 8px; margin-top: 12px; }
  .recycle .confirm button { flex: 1; font: inherit; font-weight: 700; font-size: 14.5px; border-radius: 11px; padding: 11px; cursor: pointer; border: 1.5px solid transparent; }
  .recycle .yes { background: #2E7D46; color: #fff; }
  .recycle .no { background: #fff; color: var(--ink-soft); border-color: #D8CBBA; }

  .goodbye { text-align: center; }
  .cmd { display: flex; align-items: center; gap: 8px; margin: 12px 0; background: #F1E5D2; border: 1px solid #E0CFB4; border-radius: 10px; padding: 10px 12px; }
  .cmd code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 15px; font-weight: 600; color: var(--ink); flex: 1; }
  .cmd button { background: var(--rim); color: #fff; border: none; border-radius: 8px; padding: 7px 12px; font: inherit; font-weight: 700; font-size: 13px; cursor: pointer; }
</style>
</head>

  function play(el) { try { el.currentTime = 0; el.play(); } catch (e) {} }

  // Inner HTML for a step — also used to measure the tallest step for autofit.
  function stepHTML(s) {
    const parts = s.body.map(p => `<p>${p}</p>`).join("");
    const shot = s.shot
      ? `<div class="shot"><div class="frame"><div class="bar"><i></i><i></i><i></i><span class="url">takeout.google.com</span></div><img src="${IMAGES[s.shot]}" alt="Google Takeout — what to look for"></div></div>`
      : "";
    const recycleInner = confirming
      ? `<div class="confirm"><button class="yes" id="recYes">Yes, tidy me away</button><button class="no" id="recNo">Not yet</button></div>`
      : `<button class="recycle-btn" id="recycleBtn">♻️ Recycle me</button>`;
    const recycle = s.recycle
      ? `<div class="recycle"><div class="lead">♻️ All done with me?</div><div>${s.recycle}</div>${recycleInner}</div>`
      : "";
    const aside = s.aside ? `<div class="aside">${s.aside}</div>` : "";
    return `<div class="step-tag">${s.tag}</div><h1>${s.title}</h1>${parts}${shot}${aside}${recycle}`;
  }

  // Autofit: one zoom that makes the tallest step fill the window, so text stays a
  // consistent size across steps. Recomputed on resize.
  let baseH = 780;
  function measure() {
    const saved = content.innerHTML, wasConfirming = confirming, z = app.style.zoom;
    confirming = false;
    app.style.zoom = "1";
    let max = 0;
    for (const s of steps) { content.innerHTML = stepHTML(s); if (app.offsetHeight > max) max = app.offsetHeight; }
    baseH = max;
    confirming = wasConfirming;
    content.innerHTML = saved;
    app.style.zoom = z || "1";
  }
  function fit() {
    app.style.zoom = "1";
    const z = Math.min(window.innerWidth / app.offsetWidth, window.innerHeight / baseH) * 0.98;
    app.style.zoom = String(z);
  }

  function render() {
    const s = steps[i];
    content.innerHTML = `<div class="fade">${stepHTML(s)}</div>`;
    [...dots.children].forEach((d, n) => d.classList.toggle("on", n === i));
    back.disabled = i === 0;
    next.textContent = s.cta || "Next";
    mouth.setAttribute("d", s.last ? "M60 106 q15 14 30 0" : "M63 108 q12 9 24 0");
    fit();
  }

  function hideChrome() { dots.style.visibility = "hidden"; row.style.display = "none"; mouth.setAttribute("d", "M60 106 q15 14 30 0"); }

  function goodbye() {

    // helper (http), POST /recycle runs the real uninstall. Opened as a bare file
    // there's no bridge — so we guide the user rather than pretend it happened.
    if (location.protocol === "http:" || location.protocol === "https:") {
      try { const r = await fetch("/recycle", { method: "POST" }); if (r.ok) return goodbye(); } catch (e) {}
    }
    guide();
  }

  content.addEventListener("click", (e) => {
    const id = e.target && e.target.id;
    if (id === "recycleBtn") { confirming = true; render(); }
    else if (id === "recNo") { confirming = false; render(); }
    else if (id === "recYes") { doRecycle(); }
    else if (id === "copyCmd") { try { navigator.clipboard.writeText("reheat recycle"); e.target.textContent = "Copied"; } catch (x) {} }
  });

  next.addEventListener("click", () => {
    confirming = false;
    if (steps[i].last) { i = 0; play(pop); render(); return; } // "Run it again" loops to the top
    i++;
    play(steps[i].last ? chime : pop);
    render();
  });
  back.addEventListener("click", () => { confirming = false; if (i > 0) { i--; play(pop); render(); } });

  window.addEventListener("resize", () => { measure(); fit(); });

  measure();
  render();
</script>
</body>
</html>
