<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reheat — Gene shows you the ropes</title>
<style>
  :root {
    --orange: #F4A85C;
    --red: #CB1C22;
    --rim: #D42E28;
    --paper-0: #FFFDF8;
    --paper-1: #F1E5D2;
    --box-line: #B89A7E;
    --ink: #3A2A20;
    --ink-soft: #7A6250;
    --card: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
    background: linear-gradient(150deg, var(--orange) 0%, var(--red) 100%);
    background-attachment: fixed;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 22px 20px 20px;
    -webkit-font-smoothing: antialiased;
  }

  .wordmark {
    color: #FFF3E4;
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 700;
    opacity: 0.85;
    margin-bottom: 12px;
  }

  /* ---- Gene, the takeout box ---- */
  .stage { height: 168px; display: flex; align-items: flex-end; justify-content: center; }
  #gene { width: 150px; height: 158px; animation: bob 3.4s ease-in-out infinite; transform-origin: 50% 100%; }
  @keyframes bob { 0%,100% { transform: translateY(0) rotate(-1.2deg); } 50% { transform: translateY(-9px) rotate(1.2deg); } }
  .steam { animation: rise 2.8s ease-in-out infinite; transform-origin: center; }
  .steam.b { animation-delay: 0.5s; }
  .steam.c { animation-delay: 1s; }
  @keyframes rise { 0% { opacity: 0; transform: translateY(6px); } 40% { opacity: 0.7; } 100% { opacity: 0; transform: translateY(-10px); } }
  @media (prefers-reduced-motion: reduce) { #gene, .steam { animation: none; } }

  /* ---- card ---- */
  .card {
    background: var(--card);
    border-radius: 22px;
    width: 100%;
    max-width: 420px;
    padding: 26px 24px 22px;
    box-shadow: 0 18px 40px rgba(90, 20, 10, 0.28);
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .step-tag {
    color: var(--rim);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 25px;
    line-height: 1.18;
    letter-spacing: -0.01em;
    margin-bottom: 14px;
  }

  p { font-size: 16.5px; line-height: 1.5; color: var(--ink-soft); margin-bottom: 12px; }
  p strong { color: var(--ink); font-weight: 650; }

  .aside {
    background: #FBF3E6;
    border-left: 4px solid var(--orange);
    border-radius: 0 12px 12px 0;
    padding: 12px 14px;
    font-size: 14.5px;
    line-height: 1.45;
    color: var(--ink);
    margin-top: 4px;
  }
  .aside b { color: var(--rim); }

  .spacer { flex: 1; min-height: 10px; }

  /* ---- controls ---- */
  .dots { display: flex; gap: 7px; justify-content: center; margin: 18px 0 16px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #E5D6C2; transition: all 0.25s; }
  .dot.on { background: var(--rim); transform: scale(1.25); }

  .row { display: flex; gap: 10px; align-items: center; }

  button {
    font-family: inherit;
    font-size: 16px;
    font-weight: 650;
    border: none;
    border-radius: 13px;
    padding: 13px 18px;
    cursor: pointer;
    transition: transform 0.08s ease, filter 0.15s ease;
  }
  button:active { transform: translateY(1px) scale(0.985); }
  .next { flex: 1; background: linear-gradient(135deg, var(--orange), var(--red)); color: #fff; }
  .next:hover { filter: brightness(1.05); }
  .back { background: transparent; color: var(--ink-soft); padding: 13px 8px; }
  .back:disabled { opacity: 0; pointer-events: none; }

  .fade { animation: fade 0.32s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
  <div class="wordmark">Reheat</div>

  <div class="stage">
    <svg id="gene" viewBox="0 0 150 158" aria-label="Gene, a friendly takeout box">
      <!-- steam -->
      <g fill="none" stroke="#FFF3E4" stroke-width="4" stroke-linecap="round">
        <path class="steam a" d="M52 34 q-9 -12 0 -24"/>
        <path class="steam b" d="M75 30 q9 -13 0 -26"/>
        <path class="steam c" d="M98 34 q-9 -12 0 -24"/>
      </g>
      <!-- wire handle -->
      <path d="M42 50 q33 -26 66 0" fill="none" stroke="#C7AC93" stroke-width="3.4" stroke-linecap="round"/>
      <!-- body -->
      <path d="M30 50 L120 50 L108 146 Q107 152 101 152 L49 152 Q43 152 42 146 Z"
            fill="#FCF4E4" stroke="var(--box-line)" stroke-width="2.4"/>
      <!-- folded lid -->
      <path d="M27 50 Q75 42 123 50 L120 58 Q75 50 30 58 Z"
            fill="#FFFDF8" stroke="var(--box-line)" stroke-width="2.4"/>
      <!-- red rim -->
      <path d="M30 58 Q75 50 120 58" fill="none" stroke="var(--rim)" stroke-width="3"/>
      <!-- face -->
      <g id="face">
        <circle class="eye" cx="60" cy="92" r="5.4" fill="#3A2A20"/>
        <circle class="eye" cx="90" cy="92" r="5.4" fill="#3A2A20"/>
        <circle cx="58.2" cy="90.2" r="1.7" fill="#fff"/>
        <circle cx="88.2" cy="90.2" r="1.7" fill="#fff"/>
        <path id="mouth" d="M63 108 q12 9 24 0" fill="none" stroke="#3A2A20" stroke-width="3.4" stroke-linecap="round"/>
        <circle cx="48" cy="104" r="4.5" fill="#F4A85C" opacity="0.55"/>
        <circle cx="102" cy="104" r="4.5" fill="#F4A85C" opacity="0.55"/>
      </g>
      <!-- little maple leaf on the box -->
      <path transform="translate(69.5,120) scale(0.34)" fill="var(--rim)"
            d="M16,0 c0.6,2.3 1.1,4.4 2.9,3.4 l-0.7,3.7 c-0.1,0.5 0.2,0.6 0.5,0.5 l3,-0.8 -0.8,2.3 c-0.1,0.4 0.1,0.5 0.3,0.6 l1.7,0.4 -3.8,3 c-0.3,0.3 -0.2,0.5 -0.1,1 l0.3,1.1 -3.6,-0.4 c-0.4,-0.1 -0.7,0.2 -0.7,0.5 l0.2,3.9 -1.2,0 0.2,-3.9 c0,-0.3 -0.3,-0.6 -0.7,-0.5 l-3.6,0.4 0.3,-1.1 c0.1,-0.5 0.2,-0.7 -0.1,-1 l-3.8,-3 1.7,-0.4 c0.2,-0.1 0.5,-0.2 0.3,-0.6 l-0.8,-2.3 3,0.8 c0.4,0.1 0.6,0 0.5,-0.5 l-0.7,-3.7 c1.8,0.9 2.3,-1.1 2.9,-3.4 z"/>
    </svg>
  </div>

  <div class="card">
    <div id="content"></div>
    <div class="spacer"></div>
    <div class="dots" id="dots"></div>
    <div class="row">
      <button class="back" id="back">Back</button>
      <button class="next" id="next">Next</button>
    </div>
  </div>

  <audio id="pop" src="../assets/pop.mp3" preload="auto"></audio>
  <audio id="chime" src="../assets/chime.mp3" preload="auto"></audio>

<script>
  const steps = [
    {
      tag: "Hi, I'm Gene",
      title: "Let's warm your photos back up.",
      body: [
        "When you download your pictures from Google, it quietly strips off the <strong>date</strong> and the <strong>place</strong> each one was taken.",
        "I put those back — then set everything gently into <strong>Apple Photos</strong>, in order, on the map. You don't have to become a computer person. Just follow along."
      ]
    },
    {
      tag: "Step 1 · Ask Google",
      title: "Get your photos out of Google.",
      body: [
        "I opened <strong>Google Takeout</strong> for you in another window. Pick <strong>Google Photos</strong>, then let Google email you a download link.",
        "This part can take a while — sometimes hours. That's Google being slow, not me. Go make a coffee."
      ]
    },
    {
      tag: "Step 2 · Drop it in",
      title: "Drop the download in the warmer.",
      body: [
        "When Google's link arrives, you'll get a <strong>.zip</strong> file. Drag it into the <strong>Reheat</strong> folder I just opened for you.",
        "That's the whole job. Drop in as many as you like — I take them one at a time."
      ]
    },
    {
      tag: "Step 3 · One honest ask",
      title: "macOS will check that you meant it.",
      body: [
        "The very first time, your Mac will ask: <em>“Reheat wants to control Photos.”</em> Click <strong>Allow</strong>.",
      ],
      aside: "That's macOS keeping you safe, not me being nosy. <b>I only ever add photos — I never delete or change what's already there.</b>"
    },
    {
      tag: "That's it",
      title: "Now you can relax.",
      body: [
        "You'll hear a <strong>chime</strong> when your photos land in Apple Photos — dated, placed, in order.",
        "Close this window whenever you like. I'll keep the warmer on and handle anything you drop in, quietly, in the background."
      ],
      last: true
    }
  ];

  let i = 0;
  const content = document.getElementById("content");
  const dots = document.getElementById("dots");
  const back = document.getElementById("back");
  const next = document.getElementById("next");
  const pop = document.getElementById("pop");
  const chime = document.getElementById("chime");
  const mouth = document.getElementById("mouth");

  steps.forEach(() => { const d = document.createElement("div"); d.className = "dot"; dots.appendChild(d); });

  function play(el) { try { el.currentTime = 0; el.play(); } catch (e) {} }

  function render() {
    const s = steps[i];
    const parts = s.body.map(p => `<p>${p}</p>`).join("");
    const aside = s.aside ? `<div class="aside">${s.aside}</div>` : "";
    content.innerHTML =
      `<div class="fade"><div class="step-tag">${s.tag}</div><h1>${s.title}</h1>${parts}${aside}</div>`;
    [...dots.children].forEach((d, n) => d.classList.toggle("on", n === i));
    back.disabled = i === 0;
    next.textContent = s.last ? "All set" : "Next";
    // a bigger smile on the happy ending
    mouth.setAttribute("d", s.last ? "M60 106 q15 14 30 0" : "M63 108 q12 9 24 0");
  }

  next.addEventListener("click", () => {
    if (steps[i].last) { play(chime); return; }
    i++;
    play(pop);
    render();
  });
  back.addEventListener("click", () => { if (i > 0) { i--; play(pop); render(); } });

  render();
</script>
</body>
</html>
