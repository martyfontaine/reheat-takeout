  </defs>

  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <!-- steam -->
  <g fill="none" stroke="#FFF3E4" stroke-width="17" stroke-linecap="round" opacity="0.5">
    <path d="M432 300 q-42 -56 0 -112"/>
    <path d="M512 284 q42 -60 0 -122"/>
    <path d="M592 300 q-42 -56 0 -112"/>
  </g>

  <!-- wire handle -->
  <path d="M374 360 q138 -118 276 0" fill="none" stroke="#C7AC93" stroke-width="12" stroke-linecap="round" opacity="0.85"/>

  <!-- oyster-pail body -->
  <path d="M300 352 L724 352 L668 812 Q666 828 650 828 L374 828 Q358 828 356 812 Z"
        fill="url(#paper)" stroke="#CBB199" stroke-width="9"/>
  <!-- folded lid -->
  <path d="M286 352 Q512 312 738 352 L726 386 Q512 350 298 386 Z"
