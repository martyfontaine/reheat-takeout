    <path d="M50,2.5 c1.9,7.2 3.4,13.6 8.9,10.7 l-2.2,11.4 c-0.3,1.6 0.5,2 1.6,1.6 l9.4,-2.4 -2.4,7.1 c-0.4,1.2 0.2,1.6 1,1.8 l5.3,1.3 -11.9,9.4 c-1,0.8 -0.6,1.6 -0.2,3 l1,3.3 -11.2,-1.3 c-1.4,-0.2 -2.3,0.5 -2.3,1.6 l0.6,12.2 -3.9,0 0.6,-12.2 c0,-1.1 -0.9,-1.8 -2.3,-1.6 l-11.2,1.3 1,-3.3 c0.4,-1.4 0.8,-2.2 -0.2,-3 l-11.9,-9.4 5.3,-1.3 c0.8,-0.2 1.4,-0.6 1,-1.8 l-2.4,-7.1 9.4,2.4 c1.1,0.4 1.9,0 1.6,-1.6 l-2.2,-11.4 c5.5,2.9 7,-3.5 8.9,-10.7 z" fill="#D42E28"/>
